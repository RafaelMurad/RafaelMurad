<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <style>
    @keyframes rocket-fly {
      0% { transform: translate(-60px, 0); }
      100% { transform: translate(860px, 0); }
    }
    @keyframes flame1 {
      0%, 100% { transform: scaleX(1); fill: #FF7B72; }
      50% { transform: scaleX(0.7); fill: #F8E3A1; }
    }
    @keyframes flame2 {
      0%, 100% { transform: scaleX(0.8); fill: #F8E3A1; }
      50% { transform: scaleX(1); fill: #FF7B72; }
    }
    @keyframes star-twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    @keyframes trail-fade {
      0% { opacity: 0.6; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(-40px); }
    }
    @keyframes orbit-bit {
      0% { transform: rotate(0deg) translateX(25px); }
      100% { transform: rotate(360deg) translateX(25px); }
    }
    @keyframes planet-pulse {
      0%, 100% { r: 8; opacity: 0.3; }
      50% { r: 9; opacity: 0.5; }
    }
    .rocket { animation: rocket-fly 10s linear infinite; }
    .flame-1 { animation: flame1 0.2s steps(2) infinite; transform-origin: center; }
    .flame-2 { animation: flame2 0.15s steps(2) infinite; transform-origin: center; }
    .star { animation: star-twinkle 2s ease-in-out infinite; }
    .trail { animation: trail-fade 0.8s linear infinite; }
    .orbit { animation: orbit-bit 2s linear infinite; }
    .planet { animation: planet-pulse 3s ease-in-out infinite; }
    .pixel-text { font-family: monospace; font-size: 10px; fill: #7D8590; }
  </style>
  <rect width="800" height="200" fill="#0d1117"/>
  <!-- Starfield -->
  <rect class="star" x="45" y="25" width="2" height="2" fill="#E6EDF3" style="animation-delay:0s"/>
  <rect class="star" x="120" y="80" width="2" height="2" fill="#E6EDF3" style="animation-delay:0.3s"/>
  <rect class="star" x="190" y="45" width="2" height="2" fill="#E6EDF3" style="animation-delay:0.7s"/>
  <rect class="star" x="260" y="15" width="2" height="2" fill="#E6EDF3" style="animation-delay:1.2s"/>
  <rect class="star" x="310" y="95" width="2" height="2" fill="#E6EDF3" style="animation-delay:0.1s"/>
  <rect class="star" x="380" y="30" width="2" height="2" fill="#E6EDF3" style="animation-delay:0.5s"/>
  <rect class="star" x="450" y="70" width="2" height="2" fill="#E6EDF3" style="animation-delay:0.9s"/>
  <rect class="star" x="520" y="20" width="2" height="2" fill="#E6EDF3" style="animation-delay:1.4s"/>
  <rect class="star" x="580" y="90" width="2" height="2" fill="#E6EDF3" style="animation-delay:0.4s"/>
  <rect class="star" x="650" y="40" width="2" height="2" fill="#E6EDF3" style="animation-delay:0.8s"/>
  <rect class="star" x="710" y="75" width="2" height="2" fill="#E6EDF3" style="animation-delay:1.1s"/>
  <rect class="star" x="770" y="25" width="2" height="2" fill="#E6EDF3" style="animation-delay:0.6s"/>
  <rect class="star" x="90" y="140" width="2" height="2" fill="#E6EDF3" style="animation-delay:1.5s"/>
  <rect class="star" x="340" y="150" width="2" height="2" fill="#E6EDF3" style="animation-delay:0.2s"/>
  <rect class="star" x="500" y="130" width="2" height="2" fill="#E6EDF3" style="animation-delay:1.0s"/>
  <rect class="star" x="680" y="145" width="2" height="2" fill="#E6EDF3" style="animation-delay:0.3s"/>
  <!-- Planets (pipeline stages) -->
  <g>
    <circle class="planet" cx="130" cy="160" r="8" fill="#58A6FF" style="animation-delay:0s"/>
    <text x="130" y="185" class="pixel-text" text-anchor="middle" font-size="8">IDEA</text>
  </g>
  <g>
    <circle class="planet" cx="290" cy="160" r="8" fill="#7EE787" style="animation-delay:0.5s"/>
    <text x="290" y="185" class="pixel-text" text-anchor="middle" font-size="8">CODE</text>
  </g>
  <g>
    <circle class="planet" cx="450" cy="160" r="8" fill="#D2A8FF" style="animation-delay:1s"/>
    <text x="450" y="185" class="pixel-text" text-anchor="middle" font-size="8">TEST</text>
  </g>
  <g>
    <circle class="planet" cx="610" cy="160" r="8" fill="#FF7B72" style="animation-delay:1.5s"/>
    <text x="610" y="185" class="pixel-text" text-anchor="middle" font-size="8">DEPLOY</text>
  </g>
  <g>
    <circle class="planet" cx="740" cy="160" r="8" fill="#F8E3A1" style="animation-delay:2s"/>
    <text x="740" y="185" class="pixel-text" text-anchor="middle" font-size="8">ORBIT</text>
  </g>
  <!-- Dotted flight path -->
  <line x1="0" y1="110" x2="800" y2="110" stroke="#30363d" stroke-width="1" stroke-dasharray="6 6"/>
  <!-- Rocket -->
  <g class="rocket">
    <!-- Exhaust trail -->
    <g class="trail"><rect x="-30" y="106" width="8" height="3" fill="#FF7B72" opacity="0.4" rx="1"/></g>
    <g class="trail" style="animation-delay:0.2s"><rect x="-20" y="111" width="6" height="3" fill="#F8E3A1" opacity="0.3" rx="1"/></g>
    <g class="trail" style="animation-delay:0.4s"><rect x="-25" y="115" width="5" height="2" fill="#FF7B72" opacity="0.2" rx="1"/></g>
    <!-- Flames -->
    <g class="flame-1"><rect x="-16" y="105" width="12" height="4" fill="#FF7B72" rx="1"/></g>
    <g class="flame-2"><rect x="-14" y="110" width="10" height="4" fill="#F8E3A1" rx="1"/></g>
    <!-- Rocket body -->
    <rect x="0" y="100" width="30" height="20" fill="#E6EDF3" rx="2"/>
    <rect x="2" y="102" width="26" height="16" fill="#C9D1D9"/>
    <!-- Nose cone -->
    <polygon points="30,100 42,110 30,120" fill="#58A6FF"/>
    <!-- Window -->
    <circle cx="22" cy="110" r="5" fill="#1F6FEB"/>
    <circle cx="23" cy="109" r="2" fill="#58A6FF" opacity="0.6"/>
    <!-- Fins -->
    <polygon points="0,100 -4,95 4,100" fill="#FF7B72"/>
    <polygon points="0,120 -4,125 4,120" fill="#FF7B72"/>
    <!-- Orbiting code bits -->
    <g style="transform-origin: 20px 110px;" class="orbit">
      <text x="20" y="110" font-family="monospace" font-size="7" fill="#7EE787" font-weight="bold">&lt;/&gt;</text>
    </g>
    <g style="transform-origin: 20px 110px; animation-delay: 0.7s;" class="orbit">
      <text x="20" y="110" font-family="monospace" font-size="6" fill="#D2A8FF" font-weight="bold">{}</text>
    </g>
    <g style="transform-origin: 20px 110px; animation-delay: 1.4s;" class="orbit">
      <text x="20" y="110" font-family="monospace" font-size="6" fill="#F8E3A1" font-weight="bold">fn</text>
    </g>
  </g>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#E6EDF3" letter-spacing="2">Rafael Murad</text>
  <text x="400" y="55" text-anchor="middle" font-family="monospace" font-size="12" fill="#7D8590">launching code into orbit</text>
</svg>
