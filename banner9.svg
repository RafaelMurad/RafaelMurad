<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <style>
    @keyframes cat-walk {
      0%, 100% { transform: translateX(-50px); }
      50% { transform: translateX(810px); }
    }
    @keyframes cat-bob {
      0%, 100% { transform: translateY(0); }
      25% { transform: translateY(-2px); }
      50% { transform: translateY(0); }
      75% { transform: translateY(-2px); }
    }
    @keyframes tail-wag {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(10deg); }
    }
    @keyframes paw-bat {
      0%, 80%, 100% { transform: rotate(0deg); }
      85%, 95% { transform: rotate(-30deg); }
    }
    @keyframes yarn-roll {
      0% { transform: translateX(0) rotate(0deg); }
      100% { transform: translateX(40px) rotate(360deg); }
    }
    @keyframes code-scatter {
      0% { transform: translate(0, 0); opacity: 1; }
      100% { transform: translate(20px, -15px); opacity: 0; }
    }
    @keyframes purr {
      0%, 100% { opacity: 0; }
      10%, 30% { opacity: 0.6; }
      50% { opacity: 0; }
      60%, 80% { opacity: 0.5; }
    }
    @keyframes eye-slow-blink {
      0%, 45%, 50%, 100% { height: 4px; y: 120; }
      47% { height: 1px; y: 122; }
    }
    @keyframes mouse-scurry {
      0% { transform: translateX(820px); }
      100% { transform: translateX(-30px); }
    }
    .cat-group { animation: cat-walk 16s linear infinite; }
    .cat-body { animation: cat-bob 0.4s steps(2) infinite; }
    .tail { animation: tail-wag 0.8s ease-in-out infinite; transform-origin: 0px 140px; }
    .paw-r { animation: paw-bat 3s ease-in-out infinite; transform-origin: 30px 145px; }
    .purr { animation: purr 4s linear infinite; }
    .cat-eye { animation: eye-slow-blink 5s steps(1) infinite; }
    .mouse { animation: mouse-scurry 18s linear infinite 2s; }
    .pixel-text { font-family: monospace; font-size: 10px; fill: #7D8590; }
  </style>
  <rect width="800" height="200" fill="#0d1117"/>
  <!-- Desk surface -->
  <rect x="0" y="160" width="800" height="40" fill="#21262d"/>
  <rect x="0" y="160" width="800" height="3" fill="#30363d"/>
  <!-- Keyboard -->
  <g opacity="0.4">
    <rect x="300" y="155" width="80" height="8" fill="#30363d" rx="1"/>
    <rect x="303" y="157" width="6" height="4" fill="#484F58" rx="0.5"/>
    <rect x="311" y="157" width="6" height="4" fill="#484F58" rx="0.5"/>
    <rect x="319" y="157" width="6" height="4" fill="#484F58" rx="0.5"/>
    <rect x="327" y="157" width="6" height="4" fill="#484F58" rx="0.5"/>
    <rect x="335" y="157" width="6" height="4" fill="#484F58" rx="0.5"/>
    <rect x="343" y="157" width="6" height="4" fill="#484F58" rx="0.5"/>
    <rect x="351" y="157" width="6" height="4" fill="#484F58" rx="0.5"/>
    <rect x="359" y="157" width="6" height="4" fill="#484F58" rx="0.5"/>
    <rect x="367" y="157" width="6" height="4" fill="#484F58" rx="0.5"/>
  </g>
  <!-- Monitor -->
  <g opacity="0.3">
    <rect x="310" y="90" width="60" height="45" fill="#30363d" rx="2"/>
    <rect x="313" y="93" width="54" height="38" fill="#0d1117"/>
    <rect x="335" y="135" width="10" height="8" fill="#30363d"/>
    <rect x="325" y="143" width="30" height="3" fill="#30363d"/>
    <!-- Screen content -->
    <text x="316" y="103" font-family="monospace" font-size="5" fill="#58A6FF">const ship = () =&gt;</text>
    <text x="316" y="110" font-family="monospace" font-size="5" fill="#7EE787">  deploy(code)</text>
    <text x="316" y="117" font-family="monospace" font-size="5" fill="#D2A8FF">// TODO: more</text>
  </g>
  <!-- Pipeline on desk -->
  <rect x="0" y="156" width="800" height="1" fill="#58A6FF" opacity="0.1"/>
  <!-- Pipeline labels -->
  <text x="80" y="180" class="pixel-text" text-anchor="middle" font-size="8" opacity="0.4">IDEA</text>
  <text x="230" y="180" class="pixel-text" text-anchor="middle" font-size="8" opacity="0.4">CODE</text>
  <text x="430" y="180" class="pixel-text" text-anchor="middle" font-size="8" opacity="0.4">DEBUG</text>
  <text x="600" y="180" class="pixel-text" text-anchor="middle" font-size="8" opacity="0.4">TEST</text>
  <text x="730" y="180" class="pixel-text" text-anchor="middle" font-size="8" opacity="0.4">SHIP</text>
  <!-- Code bits scattered on desk -->
  <text x="120" y="155" font-family="monospace" font-size="7" fill="#58A6FF" opacity="0.5">&lt;/&gt;</text>
  <text x="450" y="153" font-family="monospace" font-size="7" fill="#7EE787" opacity="0.5">{}</text>
  <text x="550" y="155" font-family="monospace" font-size="6" fill="#D2A8FF" opacity="0.5">fn()</text>
  <text x="670" y="153" font-family="monospace" font-size="7" fill="#F8E3A1" opacity="0.5">API</text>
  <!-- Bug mouse running across desk -->
  <g class="mouse" opacity="0.5">
    <rect x="0" y="152" width="10" height="6" fill="#FF7B72" rx="3"/>
    <rect x="10" y="154" width="3" height="2" fill="#FF7B72"/>
    <rect x="-6" y="153" width="6" height="1" fill="#FF7B72"/>
    <rect x="3" y="150" width="2" height="2" fill="#FF7B72"/>
    <rect x="7" y="150" width="2" height="2" fill="#FF7B72"/>
    <text x="0" y="148" font-family="monospace" font-size="5" fill="#FF7B72">bug</text>
  </g>
  <!-- Cat -->
  <g class="cat-group">
    <g class="cat-body">
      <!-- Purr text -->
      <text class="purr" x="32" y="108" font-family="monospace" font-size="7" fill="#7D8590">purr~</text>
      <!-- Tail -->
      <g class="tail">
        <rect x="-8" y="130" width="4" height="14" fill="#484F58" rx="2"/>
        <rect x="-12" y="126" width="6" height="8" fill="#484F58" rx="3"/>
      </g>
      <!-- Body -->
      <rect x="4" y="132" width="28" height="18" fill="#484F58" rx="4"/>
      <!-- Stripes -->
      <rect x="10" y="133" width="3" height="16" fill="#30363d" opacity="0.4" rx="1"/>
      <rect x="18" y="133" width="3" height="16" fill="#30363d" opacity="0.4" rx="1"/>
      <rect x="26" y="133" width="3" height="16" fill="#30363d" opacity="0.4" rx="1"/>
      <!-- Head -->
      <rect x="8" y="112" width="20" height="20" fill="#484F58" rx="4"/>
      <!-- Ears -->
      <polygon points="8,114 4,104 14,112" fill="#484F58"/>
      <polygon points="28,114 32,104 22,112" fill="#484F58"/>
      <polygon points="9,113 6,106 13,112" fill="#FF7B72" opacity="0.4"/>
      <polygon points="27,113 30,106 23,112" fill="#FF7B72" opacity="0.4"/>
      <!-- Eyes -->
      <rect class="cat-eye" x="12" y="120" width="5" height="4" fill="#7EE787" rx="2"/>
      <rect class="cat-eye" x="21" y="120" width="5" height="4" fill="#7EE787" rx="2"/>
      <rect x="14" y="121" width="1" height="2" fill="#0d1117"/>
      <rect x="23" y="121" width="1" height="2" fill="#0d1117"/>
      <!-- Nose -->
      <rect x="17" y="125" width="3" height="2" fill="#FF7B72" rx="1"/>
      <!-- Whiskers -->
      <line x1="6" y1="125" x2="14" y2="126" stroke="#7D8590" stroke-width="0.5"/>
      <line x1="6" y1="128" x2="14" y2="128" stroke="#7D8590" stroke-width="0.5"/>
      <line x1="30" y1="125" x2="22" y2="126" stroke="#7D8590" stroke-width="0.5"/>
      <line x1="30" y1="128" x2="22" y2="128" stroke="#7D8590" stroke-width="0.5"/>
      <!-- Front paw (batting) -->
      <g class="paw-r">
        <rect x="28" y="142" width="10" height="6" fill="#484F58" rx="2"/>
        <!-- Code being batted -->
        <text x="36" y="142" font-family="monospace" font-size="7" fill="#58A6FF" opacity="0.8">&lt;/&gt;</text>
      </g>
      <!-- Legs -->
      <rect x="6" y="148" width="6" height="10" fill="#484F58" rx="1"/>
      <rect x="24" y="148" width="6" height="10" fill="#484F58" rx="1"/>
      <!-- Paws -->
      <rect x="4" y="156" width="8" height="4" fill="#30363d" rx="1"/>
      <rect x="22" y="156" width="8" height="4" fill="#30363d" rx="1"/>
    </g>
  </g>
  <!-- Coffee mug -->
  <g opacity="0.4">
    <rect x="200" y="140" width="16" height="18" fill="#484F58" rx="2"/>
    <rect x="216" y="144" width="6" height="10" fill="none" stroke="#484F58" stroke-width="2" rx="3"/>
    <text x="203" y="153" font-family="monospace" font-size="6" fill="#58A6FF">&lt;3</text>
  </g>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#E6EDF3" letter-spacing="2">Rafael Murad</text>
  <text x="400" y="62" text-anchor="middle" font-family="monospace" font-size="12" fill="#7D8590">batting code into production, one paw at a time</text>
</svg>
