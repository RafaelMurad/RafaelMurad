<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <style>
    @keyframes type-line1 {
      0%, 5% { width: 0; }
      20% { width: 180px; }
      100% { width: 180px; }
    }
    @keyframes type-line2 {
      0%, 20% { width: 0; }
      35% { width: 140px; }
      100% { width: 140px; }
    }
    @keyframes type-line3 {
      0%, 35% { width: 0; }
      50% { width: 160px; }
      100% { width: 160px; }
    }
    @keyframes type-line4 {
      0%, 50% { width: 0; }
      65% { width: 120px; }
      100% { width: 120px; }
    }
    @keyframes type-line5 {
      0%, 65% { width: 0; }
      80% { width: 100px; }
      100% { width: 100px; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes progress-fill {
      0% { width: 0; }
      80% { width: 160px; }
      100% { width: 160px; }
    }
    @keyframes check-appear {
      0%, 85% { opacity: 0; }
      90%, 100% { opacity: 1; }
    }
    @keyframes packet-send {
      0%, 70% { transform: translateX(0); opacity: 0; }
      75% { opacity: 1; }
      100% { transform: translateX(300px); opacity: 0; }
    }
    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(200px); }
    }
    @keyframes boot-flicker {
      0%, 3%, 5%, 100% { opacity: 1; }
      2%, 4% { opacity: 0.7; }
    }
    @keyframes status-pulse {
      0%, 100% { fill: #7EE787; }
      50% { fill: #2EA043; }
    }
    .line1 { animation: type-line1 8s steps(20) infinite; }
    .line2 { animation: type-line2 8s steps(20) infinite; }
    .line3 { animation: type-line3 8s steps(20) infinite; }
    .line4 { animation: type-line4 8s steps(20) infinite; }
    .line5 { animation: type-line5 8s steps(20) infinite; }
    .cursor { animation: cursor-blink 0.8s steps(1) infinite; }
    .progress { animation: progress-fill 8s ease-out infinite; }
    .check { animation: check-appear 8s steps(1) infinite; }
    .packet { animation: packet-send 8s linear infinite; }
    .scanline { animation: scanline 4s linear infinite; }
    .boot { animation: boot-flicker 8s steps(1) infinite; }
    .status { animation: status-pulse 1s ease-in-out infinite; }
    .pixel-text { font-family: monospace; font-size: 10px; fill: #7D8590; }
  </style>
  <rect width="800" height="200" fill="#0d1117"/>
  <!-- CRT scanline effect -->
  <rect class="scanline" x="0" y="0" width="800" height="2" fill="#58A6FF" opacity="0.03"/>
  <!-- Terminal window -->
  <g class="boot">
    <!-- Window chrome -->
    <rect x="20" y="15" width="360" height="170" fill="#161b22" rx="6"/>
    <rect x="20" y="15" width="360" height="22" fill="#21262d" rx="6"/>
    <rect x="20" y="30" width="360" height="8" fill="#21262d"/>
    <!-- Window buttons -->
    <circle cx="36" cy="26" r="5" fill="#FF7B72"/>
    <circle cx="52" cy="26" r="5" fill="#F8E3A1"/>
    <circle cx="68" cy="26" r="5" fill="#7EE787"/>
    <text x="160" y="29" font-family="monospace" font-size="9" fill="#7D8590" text-anchor="middle">terminal ~ pipeline</text>
    <!-- Terminal content -->
    <g>
      <text x="30" y="55" font-family="monospace" font-size="9" fill="#7EE787">$</text>
      <text x="42" y="55" font-family="monospace" font-size="9" fill="#E6EDF3">git push origin main</text>
      <text x="30" y="72" font-family="monospace" font-size="9" fill="#58A6FF" class="line1">Enumerating objects: 42...</text>
      <text x="30" y="89" font-family="monospace" font-size="9" fill="#58A6FF" class="line2">Compressing objects: 100%</text>
      <text x="30" y="106" font-family="monospace" font-size="9" fill="#7EE787" class="line3">Running tests... all passed</text>
      <text x="30" y="123" font-family="monospace" font-size="9" fill="#D2A8FF" class="line4">Building artifacts...</text>
      <text x="30" y="140" font-family="monospace" font-size="9" fill="#F8E3A1" class="line5">Deploying to prod...</text>
      <!-- Cursor -->
      <rect class="cursor" x="30" y="150" width="7" height="12" fill="#7EE787" opacity="0.8"/>
      <!-- Final check -->
      <text x="30" y="165" font-family="monospace" font-size="10" fill="#7EE787" class="check" font-weight="bold">&#x2713; Successfully deployed!</text>
    </g>
  </g>
  <!-- Pipeline visualization (right side) -->
  <g>
    <rect x="420" y="15" width="360" height="170" fill="#161b22" rx="6"/>
    <rect x="420" y="15" width="360" height="22" fill="#21262d" rx="6"/>
    <rect x="420" y="30" width="360" height="8" fill="#21262d"/>
    <text x="560" y="29" font-family="monospace" font-size="9" fill="#7D8590" text-anchor="middle">CI/CD Pipeline</text>
    <!-- Pipeline stages as blocks -->
    <!-- Stage 1: Commit -->
    <rect x="440" y="50" width="70" height="24" fill="#21262d" rx="3"/>
    <rect class="status" x="444" y="58" width="6" height="6" rx="3"/>
    <text x="456" y="66" font-family="monospace" font-size="8" fill="#E6EDF3">Commit</text>
    <text x="440" y="82" font-family="monospace" font-size="6" fill="#7D8590">pushed 3 files</text>
    <!-- Arrow -->
    <text x="516" y="66" font-family="monospace" font-size="10" fill="#30363d">&#x2192;</text>
    <!-- Stage 2: Build -->
    <rect x="535" y="50" width="70" height="24" fill="#21262d" rx="3"/>
    <rect class="status" x="539" y="58" width="6" height="6" rx="3" style="animation-delay:0.3s"/>
    <text x="551" y="66" font-family="monospace" font-size="8" fill="#E6EDF3">Build</text>
    <text x="535" y="82" font-family="monospace" font-size="6" fill="#7D8590">TypeScript 5.x</text>
    <!-- Arrow -->
    <text x="611" y="66" font-family="monospace" font-size="10" fill="#30363d">&#x2192;</text>
    <!-- Stage 3: Test -->
    <rect x="630" y="50" width="70" height="24" fill="#21262d" rx="3"/>
    <rect class="status" x="634" y="58" width="6" height="6" rx="3" style="animation-delay:0.6s"/>
    <text x="646" y="66" font-family="monospace" font-size="8" fill="#E6EDF3">Test</text>
    <text x="630" y="82" font-family="monospace" font-size="6" fill="#7D8590">42/42 passed</text>
    <!-- Arrow down -->
    <text x="665" y="98" font-family="monospace" font-size="10" fill="#30363d">&#x2193;</text>
    <!-- Stage 4: Review -->
    <rect x="630" y="105" width="70" height="24" fill="#21262d" rx="3"/>
    <rect class="status" x="634" y="113" width="6" height="6" rx="3" style="animation-delay:0.9s"/>
    <text x="646" y="121" font-family="monospace" font-size="8" fill="#E6EDF3">Review</text>
    <text x="630" y="137" font-family="monospace" font-size="6" fill="#7D8590">approved &#x2713;</text>
    <!-- Arrow left -->
    <text x="614" y="121" font-family="monospace" font-size="10" fill="#30363d">&#x2190;</text>
    <!-- Stage 5: Deploy -->
    <rect x="535" y="105" width="70" height="24" fill="#21262d" rx="3"/>
    <rect class="status" x="539" y="113" width="6" height="6" rx="3" style="animation-delay:1.2s"/>
    <text x="551" y="121" font-family="monospace" font-size="8" fill="#E6EDF3">Deploy</text>
    <text x="535" y="137" font-family="monospace" font-size="6" fill="#7D8590">prod-us-east</text>
    <!-- Arrow left -->
    <text x="519" y="121" font-family="monospace" font-size="10" fill="#30363d">&#x2190;</text>
    <!-- Stage 6: Live -->
    <rect x="440" y="105" width="70" height="24" fill="#1a3a1a" rx="3" stroke="#7EE787" stroke-width="1"/>
    <rect class="status" x="444" y="113" width="6" height="6" rx="3" style="animation-delay:1.5s"/>
    <text x="456" y="121" font-family="monospace" font-size="8" fill="#7EE787" font-weight="bold">Live!</text>
    <text x="440" y="137" font-family="monospace" font-size="6" fill="#7EE787">uptime: 99.9%</text>
    <!-- Progress bar -->
    <rect x="440" y="150" width="320" height="10" fill="#21262d" rx="2"/>
    <rect class="progress" x="440" y="150" width="0" height="10" fill="#58A6FF" rx="2"/>
    <text x="440" y="172" font-family="monospace" font-size="7" fill="#7D8590">Pipeline progress</text>
    <!-- Data packets flying -->
    <g class="packet">
      <rect x="440" y="148" width="8" height="5" fill="#F8E3A1" rx="1"/>
      <text x="441" y="153" font-family="monospace" font-size="4" fill="#0d1117">&lt;&gt;</text>
    </g>
  </g>
  <!-- Title at very top center -->
  <text x="400" y="10" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#E6EDF3" letter-spacing="2">Rafael Murad</text>
</svg>
