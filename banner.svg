<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#0d1117"/>
      <rect width="7" height="7" fill="#161b22"/>
    </pattern>
  </defs>
  <rect width="800" height="200" fill="url(#grid)"/>
  <!-- Accent line -->
  <rect x="300" y="55" width="200" height="2" fill="#58A6FF" opacity="0.4"/>
  <!-- Name -->
  <text x="400" y="90" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#E6EDF3" letter-spacing="3">Rafael Murad</text>
  <!-- Subtitle -->
  <text x="400" y="115" text-anchor="middle" font-family="monospace" font-size="11" fill="#7D8590" letter-spacing="1.5">software engineer</text>
  <!-- Accent line -->
  <rect x="300" y="128" width="200" height="2" fill="#58A6FF" opacity="0.4"/>
  <!-- Minimal pixel accents - left cluster -->
  <rect x="120" y="85" width="4" height="4" fill="#58A6FF" opacity="0.5"/>
  <rect x="128" y="85" width="4" height="4" fill="#7EE787" opacity="0.4"/>
  <rect x="124" y="93" width="4" height="4" fill="#D2A8FF" opacity="0.3"/>
  <!-- Minimal pixel accents - right cluster -->
  <rect x="672" y="85" width="4" height="4" fill="#D2A8FF" opacity="0.3"/>
  <rect x="676" y="93" width="4" height="4" fill="#58A6FF" opacity="0.5"/>
  <rect x="680" y="85" width="4" height="4" fill="#7EE787" opacity="0.4"/>
  <!-- Corner dots -->
  <rect x="16" y="16" width="3" height="3" fill="#30363d"/>
  <rect x="781" y="16" width="3" height="3" fill="#30363d"/>
  <rect x="16" y="181" width="3" height="3" fill="#30363d"/>
  <rect x="781" y="181" width="3" height="3" fill="#30363d"/>
</svg>
