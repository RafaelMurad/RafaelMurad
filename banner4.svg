<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <style>
    @keyframes arm1 {
      0%, 30%, 100% { transform: rotate(0deg); }
      15% { transform: rotate(-30deg); }
    }
    @keyframes arm2 {
      0%, 100% { transform: rotate(0deg); }
      40%, 55% { transform: rotate(-25deg); }
    }
    @keyframes arm3 {
      0%, 100% { transform: rotate(0deg); }
      65%, 80% { transform: rotate(-35deg); }
    }
    @keyframes belt-move {
      0% { transform: translateX(0); }
      100% { transform: translateX(-20px); }
    }
    @keyframes block-flow {
      0% { transform: translateX(-100px); }
      100% { transform: translateX(900px); }
    }
    @keyframes stamp {
      0%, 40%, 100% { transform: translateY(0); }
      45%, 55% { transform: translateY(10px); }
    }
    @keyframes steam-rise {
      0% { transform: translateY(0); opacity: 0.6; }
      100% { transform: translateY(-20px); opacity: 0; }
    }
    @keyframes gear-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes light-green {
      0%, 100% { fill: #30363d; }
      50% { fill: #7EE787; }
    }
    .arm-1 { animation: arm1 4s ease-in-out infinite; transform-origin: 130px 100px; }
    .arm-2 { animation: arm2 4s ease-in-out infinite; transform-origin: 350px 100px; }
    .arm-3 { animation: arm3 4s ease-in-out infinite; transform-origin: 570px 100px; }
    .belt { animation: belt-move 0.4s linear infinite; }
    .block-1 { animation: block-flow 8s linear infinite; }
    .block-2 { animation: block-flow 8s linear infinite 2s; }
    .block-3 { animation: block-flow 8s linear infinite 4s; }
    .block-4 { animation: block-flow 8s linear infinite 6s; }
    .stamp-1 { animation: stamp 4s ease-in-out infinite; }
    .stamp-2 { animation: stamp 4s ease-in-out infinite 1.3s; }
    .stamp-3 { animation: stamp 4s ease-in-out infinite 2.6s; }
    .steam { animation: steam-rise 1.5s linear infinite; }
    .gear { animation: gear-spin 3s linear infinite; }
    .status-light { animation: light-green 2s steps(1) infinite; }
    .pixel-text { font-family: monospace; font-size: 10px; fill: #7D8590; }
  </style>
  <rect width="800" height="200" fill="#0d1117"/>
  <!-- Factory ceiling -->
  <rect x="0" y="0" width="800" height="8" fill="#21262d"/>
  <rect x="0" y="8" width="800" height="2" fill="#30363d"/>
  <!-- Conveyor belt -->
  <rect x="0" y="150" width="800" height="6" fill="#30363d"/>
  <rect x="0" y="156" width="800" height="14" fill="#21262d"/>
  <rect x="0" y="170" width="800" height="4" fill="#30363d"/>
  <g class="belt" opacity="0.4">
    <line x1="0" y1="163" x2="820" y2="163" stroke="#484F58" stroke-width="2" stroke-dasharray="10 10"/>
  </g>
  <!-- Conveyor rollers -->
  <g opacity="0.3">
    <circle cx="30" cy="174" r="4" fill="#484F58"/>
    <circle cx="100" cy="174" r="4" fill="#484F58"/>
    <circle cx="170" cy="174" r="4" fill="#484F58"/>
    <circle cx="240" cy="174" r="4" fill="#484F58"/>
    <circle cx="310" cy="174" r="4" fill="#484F58"/>
    <circle cx="380" cy="174" r="4" fill="#484F58"/>
    <circle cx="450" cy="174" r="4" fill="#484F58"/>
    <circle cx="520" cy="174" r="4" fill="#484F58"/>
    <circle cx="590" cy="174" r="4" fill="#484F58"/>
    <circle cx="660" cy="174" r="4" fill="#484F58"/>
    <circle cx="730" cy="174" r="4" fill="#484F58"/>
  </g>
  <!-- Robot arms from ceiling -->
  <!-- Arm 1: BUILD -->
  <g class="arm-1">
    <rect x="126" y="10" width="8" height="90" fill="#484F58"/>
    <rect x="120" y="95" width="20" height="14" fill="#58A6FF"/>
    <rect x="124" y="109" width="4" height="8" fill="#484F58"/>
    <rect x="132" y="109" width="4" height="8" fill="#484F58"/>
  </g>
  <rect class="status-light" x="126" y="16" width="8" height="4" fill="#30363d" style="animation-delay:0s"/>
  <!-- Arm 2: TEST -->
  <g class="arm-2">
    <rect x="346" y="10" width="8" height="90" fill="#484F58"/>
    <rect x="340" y="95" width="20" height="14" fill="#7EE787"/>
    <rect x="344" y="109" width="4" height="8" fill="#484F58"/>
    <rect x="352" y="109" width="4" height="8" fill="#484F58"/>
  </g>
  <rect class="status-light" x="346" y="16" width="8" height="4" fill="#30363d" style="animation-delay:0.7s"/>
  <!-- Arm 3: DEPLOY -->
  <g class="arm-3">
    <rect x="566" y="10" width="8" height="90" fill="#484F58"/>
    <rect x="560" y="95" width="20" height="14" fill="#D2A8FF"/>
    <rect x="564" y="109" width="4" height="8" fill="#484F58"/>
    <rect x="572" y="109" width="4" height="8" fill="#484F58"/>
  </g>
  <rect class="status-light" x="566" y="16" width="8" height="4" fill="#30363d" style="animation-delay:1.4s"/>
  <!-- Quality stamps -->
  <g class="stamp-1"><rect x="194" y="100" width="12" height="20" fill="#FF7B72"/><text x="196" y="114" font-family="monospace" font-size="6" fill="#fff">OK</text></g>
  <g class="stamp-2"><rect x="414" y="100" width="12" height="20" fill="#7EE787"/><text x="415" y="114" font-family="monospace" font-size="5" fill="#0d1117">PASS</text></g>
  <g class="stamp-3"><rect x="634" y="100" width="12" height="20" fill="#58A6FF"/><text x="636" y="114" font-family="monospace" font-size="5" fill="#fff">SHIP</text></g>
  <!-- Code blocks on belt -->
  <g class="block-1">
    <rect x="0" y="134" width="20" height="16" fill="#58A6FF" rx="2"/>
    <text x="3" y="145" font-family="monospace" font-size="7" fill="#fff">&lt;/&gt;</text>
  </g>
  <g class="block-2">
    <rect x="0" y="134" width="20" height="16" fill="#7EE787" rx="2"/>
    <text x="3" y="145" font-family="monospace" font-size="7" fill="#0d1117">{..}</text>
  </g>
  <g class="block-3">
    <rect x="0" y="134" width="20" height="16" fill="#D2A8FF" rx="2"/>
    <text x="3" y="145" font-family="monospace" font-size="7" fill="#0d1117">fn()</text>
  </g>
  <g class="block-4">
    <rect x="0" y="132" width="20" height="18" fill="#F8E3A1" rx="2"/>
    <text x="4" y="144" font-family="monospace" font-size="7" fill="#0d1117">API</text>
  </g>
  <!-- Steam -->
  <g class="steam" opacity="0.3"><rect x="140" y="80" width="4" height="4" fill="#484F58" rx="2"/></g>
  <g class="steam" style="animation-delay:0.5s" opacity="0.3"><rect x="360" y="80" width="4" height="4" fill="#484F58" rx="2"/></g>
  <g class="steam" style="animation-delay:1s" opacity="0.3"><rect x="580" y="80" width="4" height="4" fill="#484F58" rx="2"/></g>
  <!-- Labels -->
  <text x="130" y="190" class="pixel-text" text-anchor="middle">BUILD</text>
  <text x="350" y="190" class="pixel-text" text-anchor="middle">TEST</text>
  <text x="570" y="190" class="pixel-text" text-anchor="middle">DEPLOY</text>
  <text x="730" y="145" font-family="monospace" font-size="9" fill="#7EE787">&#x2713; SHIPPED</text>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#E6EDF3" letter-spacing="2">Rafael Murad</text>
  <text x="400" y="62" text-anchor="middle" font-family="monospace" font-size="12" fill="#7D8590">assembly line of ideas</text>
</svg>
