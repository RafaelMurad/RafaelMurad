<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <style>
    @keyframes pacmove {
      0% { transform: translateX(-40px); }
      100% { transform: translateX(810px); }
    }
    @keyframes chomp {
      0%, 100% { d: path("M20,0 A20,20 0 1,1 20,40 L20,20 Z"); }
      50% { d: path("M20,0 A20,20 0 1,1 20,40 L20,20 Z"); }
    }
    @keyframes mouth-top {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-25deg); }
    }
    @keyframes mouth-bot {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(25deg); }
    }
    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes ghost1 {
      0% { transform: translateX(0); }
      50% { transform: translateX(-15px); }
      100% { transform: translateX(0); }
    }
    @keyframes ghost2 {
      0% { transform: translateX(0); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }
    @keyframes power-pulse {
      0%, 100% { opacity: 0.5; r: 6; }
      50% { opacity: 1; r: 8; }
    }
    .pac-group { animation: pacmove 10s linear infinite; }
    .mouth-t { animation: mouth-top 0.3s steps(3) infinite; transform-origin: 20px 20px; }
    .mouth-b { animation: mouth-bot 0.3s steps(3) infinite; transform-origin: 20px 20px; }
    .dot { animation: dot-blink 2s ease-in-out infinite; }
    .ghost-1 { animation: ghost1 2s ease-in-out infinite; }
    .ghost-2 { animation: ghost2 2.5s ease-in-out infinite; }
    .power { animation: power-pulse 1.5s ease-in-out infinite; }
    .pixel-text { font-family: monospace; font-size: 10px; fill: #7D8590; }
  </style>
  <rect width="800" height="200" fill="#0d1117"/>
  <!-- Maze walls (decorative top/bottom borders) -->
  <rect x="0" y="0" width="800" height="4" fill="#1F6FEB" opacity="0.3"/>
  <rect x="0" y="196" width="800" height="4" fill="#1F6FEB" opacity="0.3"/>
  <!-- Pipeline track -->
  <rect x="0" y="108" width="800" height="2" fill="#30363d"/>
  <rect x="0" y="130" width="800" height="2" fill="#30363d"/>
  <!-- Dots (code bits to eat) -->
  <g>
    <circle cx="100" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0s"/>
    <circle cx="140" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.2s"/>
    <circle cx="180" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.4s"/>
    <circle cx="220" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.1s"/>
    <circle cx="260" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.6s"/>
    <circle cx="300" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.3s"/>
    <circle cx="340" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.8s"/>
    <circle cx="380" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.5s"/>
    <circle cx="420" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.7s"/>
    <circle cx="460" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.2s"/>
    <circle cx="500" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.9s"/>
    <circle cx="540" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.4s"/>
    <circle cx="580" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.1s"/>
    <circle cx="620" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.6s"/>
    <circle cx="660" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.3s"/>
    <circle cx="700" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.8s"/>
    <circle cx="740" cy="120" r="3" fill="#58A6FF" class="dot" style="animation-delay: 0.5s"/>
  </g>
  <!-- Power pellets (ideas) at pipeline stages -->
  <circle cx="160" cy="120" r="6" fill="#F8E3A1" class="power"/>
  <circle cx="330" cy="120" r="6" fill="#F8E3A1" class="power" style="animation-delay: 0.5s"/>
  <circle cx="500" cy="120" r="6" fill="#F8E3A1" class="power" style="animation-delay: 1s"/>
  <circle cx="660" cy="120" r="6" fill="#F8E3A1" class="power" style="animation-delay: 1.5s"/>
  <!-- Code labels on dots -->
  <text x="95" y="100" font-family="monospace" font-size="7" fill="#7EE787" opacity="0.6">&lt;/&gt;</text>
  <text x="218" y="100" font-family="monospace" font-size="7" fill="#FF7B72" opacity="0.6">{}</text>
  <text x="375" y="100" font-family="monospace" font-size="7" fill="#D2A8FF" opacity="0.6">fn()</text>
  <text x="535" y="100" font-family="monospace" font-size="7" fill="#7EE787" opacity="0.6">API</text>
  <text x="695" y="100" font-family="monospace" font-size="7" fill="#FF7B72" opacity="0.6">1010</text>
  <!-- Bug ghosts -->
  <g class="ghost-1" opacity="0.7">
    <rect x="270" y="112" width="16" height="16" fill="#FF7B72" rx="8"/>
    <rect x="270" y="120" width="4" height="8" fill="#FF7B72"/>
    <rect x="276" y="120" width="4" height="8" fill="#FF7B72"/>
    <rect x="282" y="120" width="4" height="8" fill="#FF7B72"/>
    <rect x="274" y="115" width="3" height="3" fill="#fff"/>
    <rect x="280" y="115" width="3" height="3" fill="#fff"/>
    <text x="270" y="108" font-family="monospace" font-size="6" fill="#FF7B72">BUG</text>
  </g>
  <g class="ghost-2" opacity="0.7">
    <rect x="570" y="112" width="16" height="16" fill="#D2A8FF" rx="8"/>
    <rect x="570" y="120" width="4" height="8" fill="#D2A8FF"/>
    <rect x="576" y="120" width="4" height="8" fill="#D2A8FF"/>
    <rect x="582" y="120" width="4" height="8" fill="#D2A8FF"/>
    <rect x="574" y="115" width="3" height="3" fill="#fff"/>
    <rect x="580" y="115" width="3" height="3" fill="#fff"/>
    <text x="570" y="108" font-family="monospace" font-size="6" fill="#D2A8FF">ERR</text>
  </g>
  <!-- Pac-Man (code eater) -->
  <g class="pac-group">
    <g transform="translate(0, 104)">
      <!-- Body -->
      <circle cx="20" cy="16" r="14" fill="#F8E3A1"/>
      <!-- Mouth (top jaw) -->
      <g class="mouth-t">
        <rect x="20" y="4" width="18" height="12" fill="#0d1117"/>
      </g>
      <!-- Mouth (bottom jaw) -->
      <g class="mouth-b">
        <rect x="20" y="16" width="18" height="12" fill="#0d1117"/>
      </g>
      <!-- Eye -->
      <rect x="22" y="8" width="4" height="4" fill="#0d1117"/>
    </g>
  </g>
  <!-- Pipeline labels -->
  <text x="80" y="155" class="pixel-text" text-anchor="middle">COMMIT</text>
  <text x="250" y="155" class="pixel-text" text-anchor="middle">BUILD</text>
  <text x="420" y="155" class="pixel-text" text-anchor="middle">TEST</text>
  <text x="590" y="155" class="pixel-text" text-anchor="middle">DEPLOY</text>
  <text x="730" y="155" class="pixel-text" text-anchor="middle">LIVE</text>
  <!-- Separators -->
  <rect x="160" y="106" width="2" height="28" fill="#30363d" opacity="0.5"/>
  <rect x="330" y="106" width="2" height="28" fill="#30363d" opacity="0.5"/>
  <rect x="500" y="106" width="2" height="28" fill="#30363d" opacity="0.5"/>
  <rect x="660" y="106" width="2" height="28" fill="#30363d" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#E6EDF3" letter-spacing="2">Rafael Murad</text>
  <text x="400" y="62" text-anchor="middle" font-family="monospace" font-size="12" fill="#7D8590">eating bugs, shipping code</text>
  <!-- Score -->
  <text x="30" y="185" font-family="monospace" font-size="9" fill="#58A6FF">SCORE: 99999</text>
  <text x="700" y="185" font-family="monospace" font-size="9" fill="#58A6FF">HI-SCORE: 99999</text>
</svg>
