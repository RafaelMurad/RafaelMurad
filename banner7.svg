<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <style>
    @keyframes flow1 {
      0% { transform: translateX(-30px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(830px); opacity: 0; }
    }
    @keyframes flow2 {
      0% { transform: translateX(-30px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(830px); opacity: 0; }
    }
    @keyframes ripple {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(2px); }
    }
    @keyframes wave {
      0% { transform: translateX(0); }
      100% { transform: translateX(-40px); }
    }
    @keyframes fish-swim {
      0% { transform: translate(820px, 0); }
      100% { transform: translate(-40px, 0); }
    }
    @keyframes bubble {
      0% { transform: translateY(0); opacity: 0.6; }
      100% { transform: translateY(-30px); opacity: 0; }
    }
    @keyframes gate-glow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    .flow-a { animation: flow1 8s linear infinite; }
    .flow-b { animation: flow2 8s linear infinite 2.7s; }
    .flow-c { animation: flow1 8s linear infinite 5.3s; }
    .ripple { animation: ripple 2s ease-in-out infinite; }
    .wave { animation: wave 2s linear infinite; }
    .fish { animation: fish-swim 20s linear infinite; }
    .bubble { animation: bubble 2s linear infinite; }
    .gate { animation: gate-glow 2s ease-in-out infinite; }
    .pixel-text { font-family: monospace; font-size: 10px; fill: #7D8590; }
  </style>
  <rect width="800" height="200" fill="#0d1117"/>
  <!-- River bed -->
  <rect x="0" y="165" width="800" height="35" fill="#161b22"/>
  <!-- River water surface -->
  <g class="wave" opacity="0.1">
    <path d="M0,100 Q10,95 20,100 Q30,105 40,100 Q50,95 60,100 Q70,105 80,100 Q90,95 100,100 Q110,105 120,100 Q130,95 140,100 Q150,105 160,100 Q170,95 180,100 Q190,105 200,100 Q210,95 220,100 Q230,105 240,100 Q250,95 260,100 Q270,105 280,100 Q290,95 300,100 Q310,105 320,100 Q330,95 340,100 Q350,105 360,100 Q370,95 380,100 Q390,105 400,100 Q410,95 420,100 Q430,105 440,100 Q450,95 460,100 Q470,105 480,100 Q490,95 500,100 Q510,105 520,100 Q530,95 540,100 Q550,105 560,100 Q570,95 580,100 Q590,105 600,100 Q610,95 620,100 Q630,105 640,100 Q650,95 660,100 Q670,105 680,100 Q690,95 700,100 Q710,105 720,100 Q730,95 740,100 Q750,105 760,100 Q770,95 780,100 Q790,105 800,100 Q810,95 820,100 Q830,105 840,100" fill="none" stroke="#58A6FF" stroke-width="2"/>
  </g>
  <!-- River body -->
  <rect x="0" y="100" width="800" height="65" fill="#0a1628" opacity="0.6"/>
  <!-- Checkpoint gates -->
  <g>
    <rect x="158" y="85" width="4" height="85" fill="#58A6FF" class="gate" opacity="0.5"/>
    <rect x="148" y="82" width="24" height="6" fill="#58A6FF" opacity="0.4"/>
    <text x="160" y="78" class="pixel-text" text-anchor="middle" font-size="8" fill="#58A6FF">COMMIT</text>
  </g>
  <g>
    <rect x="318" y="85" width="4" height="85" fill="#7EE787" class="gate" opacity="0.5" style="animation-delay:0.5s"/>
    <rect x="308" y="82" width="24" height="6" fill="#7EE787" opacity="0.4"/>
    <text x="320" y="78" class="pixel-text" text-anchor="middle" font-size="8" fill="#7EE787">BUILD</text>
  </g>
  <g>
    <rect x="478" y="85" width="4" height="85" fill="#D2A8FF" class="gate" opacity="0.5" style="animation-delay:1s"/>
    <rect x="468" y="82" width="24" height="6" fill="#D2A8FF" opacity="0.4"/>
    <text x="480" y="78" class="pixel-text" text-anchor="middle" font-size="8" fill="#D2A8FF">TEST</text>
  </g>
  <g>
    <rect x="638" y="85" width="4" height="85" fill="#FF7B72" class="gate" opacity="0.5" style="animation-delay:1.5s"/>
    <rect x="628" y="82" width="24" height="6" fill="#FF7B72" opacity="0.4"/>
    <text x="640" y="78" class="pixel-text" text-anchor="middle" font-size="8" fill="#FF7B72">DEPLOY</text>
  </g>
  <!-- Floating code blocks -->
  <g class="flow-a">
    <g class="ripple">
      <rect x="0" y="118" width="24" height="18" fill="#58A6FF" rx="3" opacity="0.9"/>
      <text x="3" y="131" font-family="monospace" font-size="8" fill="#fff">&lt;/&gt;</text>
      <!-- Lightbulb floating above -->
      <rect x="8" y="106" width="8" height="8" fill="#F8E3A1" rx="1"/>
      <rect x="10" y="102" width="4" height="5" fill="#F8E3A1" opacity="0.7"/>
    </g>
  </g>
  <g class="flow-b">
    <g class="ripple" style="animation-delay:0.5s">
      <rect x="0" y="122" width="22" height="16" fill="#7EE787" rx="3" opacity="0.9"/>
      <text x="3" y="134" font-family="monospace" font-size="7" fill="#0d1117">fn()</text>
    </g>
  </g>
  <g class="flow-c">
    <g class="ripple" style="animation-delay:1s">
      <rect x="0" y="116" width="20" height="16" fill="#D2A8FF" rx="3" opacity="0.9"/>
      <text x="3" y="128" font-family="monospace" font-size="8" fill="#0d1117">{}</text>
      <rect x="6" y="104" width="8" height="8" fill="#F8E3A1" rx="1"/>
      <rect x="8" y="100" width="4" height="5" fill="#F8E3A1" opacity="0.7"/>
    </g>
  </g>
  <!-- Pixel fish (bug) swimming upstream -->
  <g class="fish" opacity="0.4">
    <polygon points="20,135 10,130 10,140" fill="#FF7B72"/>
    <rect x="10" y="132" width="4" height="6" fill="#FF7B72"/>
    <text x="4" y="128" font-family="monospace" font-size="5" fill="#FF7B72">bug</text>
  </g>
  <!-- Bubbles -->
  <circle class="bubble" cx="200" cy="140" r="2" fill="#58A6FF" opacity="0.3" style="animation-delay:0s"/>
  <circle class="bubble" cx="400" cy="135" r="2" fill="#58A6FF" opacity="0.3" style="animation-delay:0.8s"/>
  <circle class="bubble" cx="600" cy="142" r="2" fill="#58A6FF" opacity="0.3" style="animation-delay:1.5s"/>
  <!-- Riverbanks -->
  <rect x="0" y="96" width="800" height="4" fill="#30363d"/>
  <rect x="0" y="165" width="800" height="3" fill="#30363d"/>
  <!-- Trees/bushes on banks -->
  <g opacity="0.3">
    <rect x="50" y="86" width="8" height="10" fill="#7EE787"/>
    <rect x="46" y="82" width="16" height="8" fill="#7EE787"/>
    <rect x="230" y="88" width="6" height="8" fill="#7EE787"/>
    <rect x="226" y="84" width="14" height="8" fill="#7EE787"/>
    <rect x="500" y="86" width="8" height="10" fill="#7EE787"/>
    <rect x="496" y="82" width="16" height="8" fill="#7EE787"/>
    <rect x="720" y="88" width="6" height="8" fill="#7EE787"/>
    <rect x="716" y="84" width="14" height="8" fill="#7EE787"/>
  </g>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#E6EDF3" letter-spacing="2">Rafael Murad</text>
  <text x="400" y="55" text-anchor="middle" font-family="monospace" font-size="12" fill="#7D8590">ideas flowing downstream to production</text>
</svg>
