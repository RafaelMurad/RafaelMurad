<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <style>
    @keyframes mario-run {
      0%, 100% { transform: translateX(-50px); }
      50% { transform: translateX(810px); }
    }
    @keyframes mario-bob {
      0%, 100% { transform: translateY(0); }
      25% { transform: translateY(-4px); }
      50% { transform: translateY(0); }
      75% { transform: translateY(-4px); }
    }
    @keyframes pipe-glow {
      0%, 100% { fill: #2EA043; }
      50% { fill: #3FB950; }
    }
    @keyframes coin-spin {
      0%, 100% { transform: scaleX(1); }
      50% { transform: scaleX(0.2); }
    }
    @keyframes coin-float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-20px); opacity: 0; }
    }
    @keyframes block-bump {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes flag-wave {
      0%, 100% { transform: skewX(0deg); }
      50% { transform: skewX(5deg); }
    }
    .mario-group { animation: mario-run 14s linear infinite; }
    .mario-body { animation: mario-bob 0.3s steps(2) infinite; }
    .pipe-inner { animation: pipe-glow 2s ease-in-out infinite; }
    .coin { animation: coin-spin 0.8s ease-in-out infinite; }
    .coin-pop { animation: coin-float 1s linear infinite; }
    .q-block { animation: block-bump 3s ease-in-out infinite; }
    .flag { animation: flag-wave 1s ease-in-out infinite; }
    .pixel-text { font-family: monospace; font-size: 10px; fill: #7D8590; }
  </style>
  <rect width="800" height="200" fill="#0d1117"/>
  <!-- Ground -->
  <rect x="0" y="168" width="800" height="32" fill="#21262d"/>
  <rect x="0" y="168" width="800" height="4" fill="#30363d"/>
  <!-- Ground bricks pattern -->
  <g opacity="0.2">
    <rect x="0" y="176" width="16" height="8" fill="#30363d" stroke="#21262d" stroke-width="1"/>
    <rect x="16" y="176" width="16" height="8" fill="#30363d" stroke="#21262d" stroke-width="1"/>
    <rect x="32" y="176" width="16" height="8" fill="#30363d" stroke="#21262d" stroke-width="1"/>
    <rect x="48" y="176" width="16" height="8" fill="#30363d" stroke="#21262d" stroke-width="1"/>
    <rect x="64" y="176" width="16" height="8" fill="#30363d" stroke="#21262d" stroke-width="1"/>
    <rect x="8" y="184" width="16" height="8" fill="#30363d" stroke="#21262d" stroke-width="1"/>
    <rect x="24" y="184" width="16" height="8" fill="#30363d" stroke="#21262d" stroke-width="1"/>
    <rect x="40" y="184" width="16" height="8" fill="#30363d" stroke="#21262d" stroke-width="1"/>
    <rect x="56" y="184" width="16" height="8" fill="#30363d" stroke="#21262d" stroke-width="1"/>
    <rect x="72" y="184" width="16" height="8" fill="#30363d" stroke="#21262d" stroke-width="1"/>
  </g>
  <!-- Pipes (warp zones = pipeline stages) -->
  <!-- Pipe 1: IDEA -->
  <g>
    <rect x="100" y="130" width="36" height="38" fill="#2EA043"/>
    <rect x="95" y="126" width="46" height="12" fill="#2EA043"/>
    <rect class="pipe-inner" x="105" y="130" width="26" height="8" fill="#3FB950"/>
    <text x="118" y="185" class="pixel-text" text-anchor="middle" font-size="8">IDEA</text>
  </g>
  <!-- Pipe 2: CODE -->
  <g>
    <rect x="260" y="120" width="36" height="48" fill="#2EA043"/>
    <rect x="255" y="116" width="46" height="12" fill="#2EA043"/>
    <rect class="pipe-inner" x="265" y="120" width="26" height="8" fill="#3FB950" style="animation-delay:0.5s"/>
    <text x="278" y="185" class="pixel-text" text-anchor="middle" font-size="8">CODE</text>
  </g>
  <!-- Pipe 3: TEST -->
  <g>
    <rect x="420" y="125" width="36" height="43" fill="#2EA043"/>
    <rect x="415" y="121" width="46" height="12" fill="#2EA043"/>
    <rect class="pipe-inner" x="425" y="125" width="26" height="8" fill="#3FB950" style="animation-delay:1s"/>
    <text x="438" y="185" class="pixel-text" text-anchor="middle" font-size="8">TEST</text>
  </g>
  <!-- Pipe 4: DEPLOY -->
  <g>
    <rect x="580" y="115" width="36" height="53" fill="#2EA043"/>
    <rect x="575" y="111" width="46" height="12" fill="#2EA043"/>
    <rect class="pipe-inner" x="585" y="115" width="26" height="8" fill="#3FB950" style="animation-delay:1.5s"/>
    <text x="598" y="185" class="pixel-text" text-anchor="middle" font-size="8">DEPLOY</text>
  </g>
  <!-- Question blocks (ideas) -->
  <g class="q-block">
    <rect x="170" y="90" width="20" height="20" fill="#F8E3A1" rx="2"/>
    <text x="175" y="105" font-family="monospace" font-size="14" fill="#8B6914" font-weight="bold">?</text>
    <g class="coin-pop"><text x="176" y="80" font-family="monospace" font-size="8" fill="#F8E3A1">&lt;/&gt;</text></g>
  </g>
  <g class="q-block" style="animation-delay:1s">
    <rect x="340" y="85" width="20" height="20" fill="#F8E3A1" rx="2"/>
    <text x="345" y="100" font-family="monospace" font-size="14" fill="#8B6914" font-weight="bold">?</text>
    <g class="coin-pop" style="animation-delay:1s"><text x="346" y="75" font-family="monospace" font-size="8" fill="#F8E3A1">{}</text></g>
  </g>
  <g class="q-block" style="animation-delay:2s">
    <rect x="500" y="92" width="20" height="20" fill="#F8E3A1" rx="2"/>
    <text x="505" y="107" font-family="monospace" font-size="14" fill="#8B6914" font-weight="bold">?</text>
    <g class="coin-pop" style="animation-delay:2s"><text x="506" y="82" font-family="monospace" font-size="8" fill="#F8E3A1">fn</text></g>
  </g>
  <!-- Coins floating -->
  <g class="coin" style="animation-delay:0.2s">
    <circle cx="210" cy="95" r="5" fill="#F8E3A1"/>
    <text x="207" y="98" font-family="monospace" font-size="7" fill="#8B6914">$</text>
  </g>
  <g class="coin" style="animation-delay:0.6s">
    <circle cx="370" cy="90" r="5" fill="#F8E3A1"/>
    <text x="367" y="93" font-family="monospace" font-size="7" fill="#8B6914">$</text>
  </g>
  <!-- Flag pole at end -->
  <rect x="720" y="80" width="3" height="88" fill="#E6EDF3"/>
  <rect x="723" y="80" width="20" height="14" fill="#58A6FF" class="flag"/>
  <text x="726" y="92" font-family="monospace" font-size="8" fill="#fff">GO</text>
  <circle cx="721" cy="78" r="3" fill="#F8E3A1"/>
  <!-- Character -->
  <g class="mario-group">
    <g class="mario-body">
      <!-- Hat -->
      <rect x="8" y="130" width="18" height="6" fill="#58A6FF"/>
      <rect x="4" y="134" width="24" height="4" fill="#58A6FF"/>
      <!-- Face -->
      <rect x="6" y="138" width="20" height="10" fill="#E6EDF3"/>
      <rect x="10" y="140" width="3" height="3" fill="#0d1117"/>
      <rect x="19" y="140" width="3" height="3" fill="#0d1117"/>
      <rect x="12" y="145" width="8" height="2" fill="#0d1117"/>
      <!-- Body -->
      <rect x="8" y="148" width="16" height="10" fill="#484F58"/>
      <rect x="12" y="150" width="3" height="3" fill="#58A6FF"/>
      <rect x="17" y="150" width="3" height="3" fill="#7EE787"/>
      <!-- Legs -->
      <rect x="8" y="158" width="6" height="8" fill="#1F6FEB"/>
      <rect x="18" y="158" width="6" height="8" fill="#1F6FEB"/>
      <!-- Feet -->
      <rect x="6" y="164" width="8" height="4" fill="#484F58"/>
      <rect x="18" y="164" width="8" height="4" fill="#484F58"/>
    </g>
  </g>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#E6EDF3" letter-spacing="2">Rafael Murad</text>
  <text x="400" y="55" text-anchor="middle" font-family="monospace" font-size="12" fill="#7D8590">warping code through the pipeline</text>
</svg>
